services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-api_mock_server}
      POSTGRES_USER: ${DB_USER:-api_mock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_net
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${DB_USER:-api_mock}:${DB_PASSWORD:-secret}@db/${DB_NAME:-api_mock_server}
      PORT: 3000
      LEPTOS_SITE_ADDR: 0.0.0.0:3000
      LEPTOS_SITE_ROOT: /app/site
    ports:
      - "3000:3000"
    networks:
      - app_net
    restart: unless-stopped

volumes:
  pg_data:

networks:
  app_net:
    driver: bridge
