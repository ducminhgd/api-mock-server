name: Publish Docker image on tag

on:
  create:
    tags: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: api-mock-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image name and tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "REGISTRY=docker.io" >> $GITHUB_ENV
            echo "IMAGE=${{ secrets.DOCKER_USERNAME }}/api-mock-server:${TAG}" >> $GITHUB_ENV
            echo "LOGIN_REGISTRY=docker.io" >> $GITHUB_ENV
          else
            echo "REGISTRY=ghcr.io" >> $GITHUB_ENV
            echo "IMAGE=ghcr.io/${{ github.repository_owner }}/api-mock-server:${TAG}" >> $GITHUB_ENV
            echo "LOGIN_REGISTRY=ghcr.io" >> $GITHUB_ENV
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: ${{ !(secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD) }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64,linux/arm64
